services:
  # Full Development Environment (Codespaces Optimized)
  notion-dev:
    build:
      context: .
      dockerfile: Dockerfile.codespaces
    container_name: notion-codespaces-dev
    ports:
      - "3001:3001"  # API Gateway
      - "3002:3002"  # Web Chat Interface
      - "8080:8080"  # MCP Server
      - "5173:5173"  # Vite dev server
      - "4173:4173"  # Vite preview server
    environment:
      - NODE_ENV=development
      - GATEWAY_PORT=3001
      - WEB_PORT=3002
      - MCP_PORT=8080
      - NOTION_TOKEN=${NOTION_TOKEN:-demo}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID:-demo}
      - NOTION_CHARACTERS_DB_ID=${NOTION_CHARACTERS_DB_ID:-demo}
      - NOTION_SCENES_DB_ID=${NOTION_SCENES_DB_ID:-demo}
      - NOTION_LOCATIONS_DB_ID=${NOTION_LOCATIONS_DB_ID:-demo}
      - VITE_API_URL=http://localhost:3001
    env_file:
      - .env
    volumes:
      # Mount source code for hot reload
      - .:/workspace
      - /workspace/node_modules
      - /workspace/backend/node_modules
      - /workspace/frontend/modern/lz-labs-main/web-chat/node_modules
      # Mount for logs and development
      - dev-logs:/workspace/logs
      - dev-cache:/workspace/.cache
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "./healthcheck-dev.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    stdin_open: true
    tty: true
    labels:
      - "dev.codespaces.service=main"
      - "dev.codespaces.ports=3001,3002,8080"

  # Redis for development caching
  redis-dev:
    image: redis:7-alpine
    container_name: notion-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --loglevel notice
    volumes:
      - redis-dev-data:/data
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Database GUI (optional) - Redis Commander
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: notion-redis-gui
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis-dev:6379
    networks:
      - dev-network
    depends_on:
      - redis-dev
    profiles:
      - "with-gui"
    restart: unless-stopped

  # Nginx for development proxy (optional)
  nginx-dev:
    image: nginx:alpine
    container_name: notion-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dev-network
    depends_on:
      - notion-dev
    profiles:
      - "with-proxy"
    restart: unless-stopped

volumes:
  redis-dev-data:
    driver: local
  dev-logs:
    driver: local
  dev-cache:
    driver: local

networks:
  dev-network:
    driver: bridge
    labels:
      - "dev.codespaces.network=true"